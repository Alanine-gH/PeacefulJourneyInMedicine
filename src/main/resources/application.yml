server:
  port: 8080
spring:
  main:
    allow-bean-definition-overriding: true

  datasource:
    # MySQL数据库配置
    url: jdbc:mysql://localhost:3306/PeacefulJourneyInMedicine?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: admin123456789 #你的数据库密码
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      maxActive: 20
      maxWait: 60000
      timeBetweenEvictionRunsMillis: 60000
      minEvictableIdleTimeMillis: 300000
      validationQuery: SELECT 1 FROM DUAL
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      poolPreparedStatements: true
      maxPoolPreparedStatementPerConnectionSize: 20
      filters: stat,wall,log4j
      connectionProperties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
  application:
    name: PeacefulJourneyInMedicine
  data:
    redis:
      host: localhost
      port: 6379
      database: 1
      connect-timeout: 1000ms
      # jedis配置
      jedis:
        pool:
          max-active: -1 # 连接池最大连接数（负数表示没有限制）
          max-idle: 10  # 连接池最大空闲链接数
          max-wait: -1ms  # 连接池最大阻塞等待时间（负数表示没有限制）
          min-idle: 0 # 连接池最小空闲数
  mongodb:
    host: localhost
    database: PeacefulJourneyInMedicine
    port: 27017
    # uri: mongodb://localhost:27017/PeacefulJourneyInMedicine
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

  global-config:
    db-config:
      id-type: ASSIGN_ID
      table-underline: true
      logic-delete-field: isDeleted
    banner: false
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.PJDM.pojo

logging:
  level:
    com.PJDM.mapper: TRACE #INFO
minio:
  endpoint: localhost
  port: 9000
  accessKey: minioadmin
  secretKey: minioadmin
  secure: false
  bucketName: "peacefuljourneyinmedicine"
  downloadDir: "/data/images"

# SpringDoc OpenAPI 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    group: 'PeacefulJourneyInMedicine-api'
    paths-to-match: '/api/**'
    packages-to-scan: com.PJDM.controller

# 验证码配置
PeacefulJourneyInMedicine:
  captcha:
    # 验证码类型：math(数学运算) / char(字符)
    type: math
    # 是否开启验证码
    enabled: true

# 用户配置
user:
  password:
    maxRetryCount: 5  # 最大重试次数
    lockTime: 10      # 锁定时间（分钟）

# JWT配置
jwt:
  secret: "MySuperSecretKeyForSlimCamp2026ThisIsAVeryLongSecureKeyForHS512AlgorithmThatExceeds512Bits!@#$%^&*()}"  # 更安全的JWT秘钥盐:至少512位
  expire: 86400000  # JWT过期时间(毫秒)，默认24小时

# DeepSeek API配置
deepseek:
  apiKey: sk-b6202447143d4e19b5b6805042a7de8c
  baseUrl: https://api.deepseek.com
  model: deepseek-chat
  temperature: 0.7
  maxTokens: 2000

# 阿里云短信配置
aliyun:
  sms:
    access-key-id: ${ALIBABA_CLOUD_ACCESS_KEY_ID:LTAI5tFZzN3xWgJMnzGMMds7}
    access-key-secret: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:wljir2ZzKBrdCJBbBywHWfaxvXeQQ1}
    sign-name: ${ALIBABA_SMS_SIGN_NAME:速通互联验证码}
    template-code: ${ALIBABA_SMS_TEMPLATE_CODE:100001}
    endpoint: ${ALIBABA_SMS_ENDPOINT:dypnsapi.aliyuncs.com}

monitoring:
  aliyun-shutdown-alert:
    enabled: true
    phone-numbers: "19100471675,19735217217"

# 跨域配置
cors:
  allowed-origins: "http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:8080"

# 用户模块配置
user-module:
  page:
    default-size: 10        # 默认每页条数
    max-size: 100           # 最大每页条数
  security:
    id-card-mask-start: 3   # 身份证脱敏保留前N位
    id-card-mask-end: 3     # 身份证脱敏保留后N位
  accompanist:
    default-rating: 0.00    # 陪诊师默认评分
    default-on-time-rate: 100.00  # 陪诊师默认准时率

# 认证配置
auth:
  token:
    key-prefix: "login_token:"   # Redis token key 前缀
    ttl-hours: 24                 # Token 有效期（小时）
  login:
    fail-key-prefix: "login_fail:" # 登录失败次数 Redis key 前缀
    max-fail-count: 5              # 最大失败次数
    lock-minutes: 10               # 锁定时长（分钟）
  inactive:
    timeout-minutes: 20            # 无操作自动登出时间（分钟）


